name: Daily ETL Pipeline

on:
  schedule:
    # 6:30 AM IST = 1:00 AM UTC — runs after NSE bhavcopy is published
    - cron: "0 1 * * 1-5"   # Mon–Fri only
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  etl:
    runs-on: ubuntu-latest

    env:
      DB_HOST:     ${{ secrets.DB_HOST }}
      DB_PORT:     ${{ secrets.DB_PORT }}
      DB_NAME:     ${{ secrets.DB_NAME }}
      DB_USER:     ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily pipeline (UDIFF + delivery + MCAP, skip live NSE API)
        run: |
          python scripts/run_full_daily.py --skip-live

      - name: Run test suite
        run: |
          PYTHONUTF8=1 python -m pytest tests/ -q --tb=short

  precompute:
    needs: etl          # only run after ETL succeeds
    runs-on: ubuntu-latest

    env:
      DB_HOST:     ${{ secrets.DB_HOST }}
      DB_PORT:     ${{ secrets.DB_PORT }}
      DB_NAME:     ${{ secrets.DB_NAME }}
      DB_USER:     ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Derive 52-week H/L and populate hl_hits
        run: |
          python scripts/derive_52week_hl.py

      - name: Pre-compute analytics into DB
        run: |
          python scripts/precompute_analytics.py
